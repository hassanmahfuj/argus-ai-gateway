<div class="flex min-h-screen">
  <app-sidebar />

  <main class="flex-1 min-w-0 bg-slate-50">
    @if (msgSuccess) { <p class="bg-green-200 border-green-800 text-green-800 border rounded p-4 m-6 mb-0" role="alert">{{ msgSuccess }}</p> }
    @if (msgInfo) { <p class="bg-blue-200 border-blue-800 text-blue-800 border rounded p-4 m-6 mb-0" role="alert">{{ msgInfo }}</p> }
    @if (msgError) { <p class="bg-red-200 border-red-800 text-red-800 border rounded p-4 m-6 mb-0" role="alert">{{ msgError }}</p> }
    <div class="p-6">
      <router-outlet />
    </div>
  </main>
</div>
