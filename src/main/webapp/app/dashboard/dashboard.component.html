<div class="space-y-4">
  <!-- Top bar: title + range toggle + ghost filter buttons -->
  <div class="flex items-center justify-between gap-4 flex-wrap">
    <h1 class="text-xl font-semibold text-slate-900">Dashboard</h1>
    <div class="flex items-center gap-3 flex-wrap">
      <app-time-range-toggle [value]="selectedRange()" (valueChange)="selectRange($event)" />
      <button type="button"
              class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-600 border border-slate-300 rounded-lg hover:bg-slate-100 cursor-pointer">
        <app-icon name="funnel" [size]="14" /> Show Filters
      </button>
      <button type="button"
              class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-600 border border-slate-300 rounded-lg hover:bg-slate-100 cursor-pointer">
        <app-icon name="bookmark" [size]="14" /> Saved Filters
      </button>
    </div>
  </div>

  <!-- Row 1: Requests (wide) | Errors (wide) | Top Models (narrow) -->
  <div class="grid grid-cols-1 lg:grid-cols-[1fr_1fr_320px] gap-4">
    <app-card><app-requests-card [data]="requests" /></app-card>
    <app-card><app-errors-card [data]="errors" /></app-card>
    <app-card><app-top-models-card [models]="models" /></app-card>
  </div>

  <!-- Row 2: Costs | Top Countries | Latency -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <app-card><app-costs-card [data]="costs" /></app-card>
    <app-card><app-top-countries-card [countries]="countries" /></app-card>
    <app-card><app-latency-card [data]="latency" /></app-card>
  </div>
</div>
