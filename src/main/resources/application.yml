gateway:
  proxy:
    api-key: ${ZAI_API_KEY:}
    timeout: 120
    upstream:
      openai: https://api.z.ai/api/coding/paas/v4
      anthropic: https://api.z.ai/api/anthropic

spring:
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/aigateway}
    username: ${JDBC_DATABASE_USERNAME:aigateway}
    password: ${JDBC_DATABASE_PASSWORD:aigateway123}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
error:
  handling:
    http-status-in-json-response: true
    exception-logging: NO_LOGGING
    full-stacktrace-http-statuses: 5xx
    log-levels:
      5xx: ERROR
